<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="722" viewBox="8 0 1260 722" role="img" aria-label="Scene Quality Matrix preview">
<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L10,4 L0,8 Z" fill="context-stroke"/>
</marker>
</defs>
<rect x="8" y="0" width="1260" height="722" fill="#FFFFFF"/>
<text x="70" y="90" fill="#0A0A0A" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" text-anchor="start"><tspan x="70" dy="0">Scene Quality Matrix</tspan></text>
<text x="74" y="123" fill="#5B5B5B" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="500" text-anchor="start"><tspan x="74" dy="0">A strict grid for checking generated boards before a human opens them.</tspan></text>
<rect x="44" y="36" width="1188" height="650" rx="0" fill="none" stroke="#0A0A0A" stroke-width="2"/>
<rect x="92" y="164" width="990" height="52" rx="0" fill="#0A0A0A" stroke="#0A0A0A" stroke-width="0"/>
<text x="122" y="197" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500" text-anchor="start"><tspan x="122" dy="0">CHECK</tspan></text>
<text x="390" y="197" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500" text-anchor="start"><tspan x="390" dy="0">FAILURE MODE</tspan></text>
<text x="720" y="197" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500" text-anchor="start"><tspan x="720" dy="0">REPAIR ACTION</tspan></text>
<rect x="92" y="216" width="990" height="78" rx="0" fill="#F2D4CF" stroke="#0A0A0A" stroke-width="2"/>
<text x="149" y="260.25" fill="#0A0A0A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500" text-anchor="middle"><tspan x="149" dy="0">01</tspan></text>
<text x="390" y="262" fill="#0A0A0A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" text-anchor="start"><tspan x="390" dy="0">text overflow</tspan></text>
<text x="720" y="262" fill="#5B5B5B" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" text-anchor="start"><tspan x="720" dy="0">widen box or wrap line</tspan></text>
<rect x="92" y="294" width="990" height="78" rx="0" fill="#F8F8F8" stroke="#0A0A0A" stroke-width="2"/>
<text x="149" y="338.25" fill="#0A0A0A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500" text-anchor="middle"><tspan x="149" dy="0">02</tspan></text>
<text x="390" y="340" fill="#0A0A0A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" text-anchor="start"><tspan x="390" dy="0">connector crosses label</tspan></text>
<text x="720" y="340" fill="#5B5B5B" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" text-anchor="start"><tspan x="720" dy="0">reroute with elbow path</tspan></text>
<rect x="92" y="372" width="990" height="78" rx="0" fill="#F2D4CF" stroke="#0A0A0A" stroke-width="2"/>
<text x="149" y="416.25" fill="#0A0A0A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500" text-anchor="middle"><tspan x="149" dy="0">03</tspan></text>
<text x="390" y="418" fill="#0A0A0A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" text-anchor="start"><tspan x="390" dy="0">unintentional overlap</tspan></text>
<text x="720" y="418" fill="#5B5B5B" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" text-anchor="start"><tspan x="720" dy="0">move card or mark shadow</tspan></text>
<rect x="92" y="450" width="990" height="78" rx="0" fill="#F8F8F8" stroke="#0A0A0A" stroke-width="2"/>
<text x="149" y="494.25" fill="#0A0A0A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500" text-anchor="middle"><tspan x="149" dy="0">04</tspan></text>
<text x="390" y="496" fill="#0A0A0A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" text-anchor="start"><tspan x="390" dy="0">off-center label</tspan></text>
<text x="720" y="496" fill="#5B5B5B" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" text-anchor="start"><tspan x="720" dy="0">align text group</tspan></text>
<rect x="92" y="566" width="990" height="44" rx="0" fill="#0A0A0A" stroke="#0A0A0A" stroke-width="0"/>
<text x="587" y="594" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500" text-anchor="middle"><tspan x="587" dy="0">The design stays sharp because every generated scene gets checked before replay.</tspan></text>
</svg>
