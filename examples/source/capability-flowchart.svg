<svg width="1180" height="720" viewBox="0 0 1180 720" xmlns="http://www.w3.org/2000/svg">
<rect width="1180" height="720" fill="#F8FBFF" />
<rect x="52" y="52" width="1076" height="600" rx="0" fill="#F8FBFF" stroke="#163B68" stroke-width="2" data-agentdraw-role="frame" />
<text x="86" y="110" font-family="Inter, Arial, Noto Sans SC, sans-serif" font-size="38" font-weight="760" fill="#163B68">AgentDraw Generation Flow</text>
<text x="88" y="148" font-family="Inter, Arial, Noto Sans SC, sans-serif" font-size="16" font-weight="500" fill="#5B708A">Professional flowchart with terminators, process blocks, decisions, and rework loops</text>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0B63CE" /></marker></defs>
<ellipse cx="590" cy="205" rx="120" ry="27" fill="#FFFFFF" stroke="#0B63CE" stroke-width="2" />
<text x="590" y="205" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, Noto Sans SC, sans-serif" font-size="18" font-weight="760" fill="#163B68">Start</text>
<line x1="590" y1="232" x2="590" y2="268" stroke="#0B63CE" stroke-width="2" marker-end="url(#arrow)" />
<rect x="430" y="268" width="320" height="84" rx="0" fill="#FFFFFF" stroke="#0B63CE" stroke-width="2" />
<text x="590" y="292" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, Noto Sans SC, sans-serif" font-size="18" font-weight="760" fill="#163B68">Choose design system</text>
<text x="590" y="326" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, Noto Sans SC, sans-serif" font-size="15" font-weight="500" fill="#5B708A">Load design.md and contract</text>
<line x1="590" y1="352" x2="590" y2="370" stroke="#0B63CE" stroke-width="2" marker-end="url(#arrow)" />
<rect x="430" y="370" width="320" height="84" rx="0" fill="#FFFFFF" stroke="#0B63CE" stroke-width="2" />
<text x="590" y="394" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, Noto Sans SC, sans-serif" font-size="18" font-weight="760" fill="#163B68">Draft restricted SVG</text>
<text x="590" y="428" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, Noto Sans SC, sans-serif" font-size="15" font-weight="500" fill="#5B708A">Use editable shapes and real text</text>
<line x1="590" y1="454" x2="590" y2="472" stroke="#0B63CE" stroke-width="2" marker-end="url(#arrow)" />
<polygon points="590,472 680,520 590,568 500,520" fill="#FFFFFF" stroke="#0B63CE" stroke-width="2" />
<text x="590" y="522" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, Noto Sans SC, sans-serif" font-size="16" font-weight="760" fill="#163B68"><tspan x="590" dy="-0.6em">Preview passes?</tspan></text>
<text x="718" y="488" font-family="Inter, Arial, Noto Sans SC, sans-serif" font-size="15" font-weight="700" fill="#163B68">Yes</text>
<text x="430" y="496" font-family="Inter, Arial, Noto Sans SC, sans-serif" font-size="15" font-weight="700" fill="#163B68">No</text>
<line x1="590" y1="568" x2="590" y2="602" stroke="#0B63CE" stroke-width="2" marker-end="url(#arrow)" />
<ellipse cx="590" cy="629" rx="120" ry="27" fill="#FFFFFF" stroke="#0B63CE" stroke-width="2" />
<text x="590" y="629" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, Noto Sans SC, sans-serif" font-size="18" font-weight="760" fill="#163B68">Open editable board</text>
<polyline points="500,520 292,520 292,403 430,403" fill="none" stroke="#0B63CE" stroke-width="2" marker-end="url(#arrow)" />
<rect x="800" y="370" width="250" height="84" rx="0" fill="#FFFFFF" stroke="#0B63CE" stroke-width="2" />
<text x="925" y="394" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, Noto Sans SC, sans-serif" font-size="18" font-weight="760" fill="#163B68">import-svg</text>
<text x="925" y="428" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, Noto Sans SC, sans-serif" font-size="15" font-weight="500" fill="#5B708A">Convert to board objects</text>
<line x1="750" y1="412" x2="800" y2="412" stroke="#0B63CE" stroke-width="2" marker-end="url(#arrow)" />
<rect x="800" y="472" width="250" height="84" rx="0" fill="#FFFFFF" stroke="#0B63CE" stroke-width="2" />
<text x="925" y="496" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, Noto Sans SC, sans-serif" font-size="18" font-weight="760" fill="#163B68">repair + validate</text>
<text x="925" y="530" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, Noto Sans SC, sans-serif" font-size="15" font-weight="500" fill="#5B708A">Normalize and gate quality</text>
<line x1="925" y1="454" x2="925" y2="472" stroke="#0B63CE" stroke-width="2" marker-end="url(#arrow)" />
<line x1="800" y1="505" x2="680" y2="505" stroke="#0B63CE" stroke-width="2" marker-end="url(#arrow)" />
<rect x="108" y="250" width="286" height="230" rx="0" fill="#DBEAFE" stroke="#B9C5D5" stroke-width="2" />
<text x="130" y="286" font-family="Inter, Arial, Noto Sans SC, sans-serif" font-size="20" font-weight="760" fill="#163B68">Flowchart conventions</text>
<text x="130" y="326" font-family="Inter, Arial, Noto Sans SC, sans-serif" font-size="16" font-weight="600" fill="#163B68">Oval = start / end</text>
<text x="130" y="362" font-family="Inter, Arial, Noto Sans SC, sans-serif" font-size="16" font-weight="600" fill="#163B68">Rectangle = process</text>
<text x="130" y="398" font-family="Inter, Arial, Noto Sans SC, sans-serif" font-size="16" font-weight="600" fill="#163B68">Diamond = decision</text>
<text x="130" y="434" font-family="Inter, Arial, Noto Sans SC, sans-serif" font-size="16" font-weight="600" fill="#163B68">Loop = revise source</text>
</svg>
